  <script>
    function formatNum(n) {
      if (n >= 1000) return Math.floor(n / 1000) + 'K+';
      return String(n);
    }

    function animateValue(el, target, duration) {
      if (target <= 0) { el.textContent = '0'; return; }
      const start = performance.now();
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = formatNum(Math.floor(eased * target));
        if (p < 1) requestAnimationFrame(tick);
        else el.textContent = formatNum(target);
      }
      requestAnimationFrame(tick);
    }

    function withTimeout(promise, ms, fallback) {
      return Promise.race([
        promise,
        new Promise(resolve => setTimeout(() => resolve(fallback), ms))
      ]);
    }

    async function fetchRoutineHub() {
      const proxies = [
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
      ];
      const target = 'https://routinehub.co/user/__MIKL__';
      for (const proxy of proxies) {
        try {
          const res = await fetch(proxy(target));
          if (!res.ok) continue;
          const html = await res.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');
          let downloads = null;
          let shortcuts = null;
          const p2 = doc.querySelector('.stats p:nth-of-type(2)');
          if (p2) {
            const m = p2.textContent.match(/(\d[\d,]*)/);
            if (m) downloads = parseInt(m[1].replace(/,/g, ''), 10);
          }
          const p1 = doc.querySelector('.stats p:nth-of-type(1)');
          if (p1) {
            const m = p1.textContent.match(/(\d[\d,]*)/);
            if (m) shortcuts = parseInt(m[1].replace(/,/g, ''), 10);
          }
          if (downloads !== null) return { downloads, shortcuts };
        } catch (e) {}
      }
      return null;
    }

    async function fetchGitHubStars() {
      let total = 0;
      try {
        const r1 = await fetch('https://api.github.com/users/mikl-shortcuts/repos?per_page=100');
        const d1 = await r1.json();
        if (Array.isArray(d1)) d1.forEach(r => total += r.stargazers_count || 0);
      } catch (e) {}
      try {
        const r2 = await fetch('https://api.github.com/repos/MIKLIUM/MIKLIUM');
        const d2 = await r2.json();
        if (d2 && d2.stargazers_count) total += d2.stargazers_count;
      } catch (e) {}
      return total || 9;
    }

    async function fetchGitHubRepos() {
      let total = 0;
      try {
        const r1 = await fetch('https://api.github.com/users/mikl-shortcuts/repos?per_page=100');
        const d1 = await r1.json();
        if (Array.isArray(d1)) total += d1.length;
      } catch (e) {}
      try {
        const r2 = await fetch('https://api.github.com/users/MIKLIUM/repos?per_page=100');
        const d2 = await r2.json();
        if (Array.isArray(d2)) total += d2.length;
      } catch (e) {}
      return Math.max(total - 1, 0);
    }

    const statsGrid = document.getElementById('statsGrid');

    const statsDef = [
      { icon: "fa-solid fa-download", label: "Downloads", color: "#0a84ff", id: "sv-0" },
      { icon: "fa-solid fa-star", label: "GitHub Stars", color: "#ffd60a", id: "sv-1" },
      { icon: "fa-solid fa-cube", label: "Projects", color: "#30d158", id: "sv-2" },
    ];

    statsDef.forEach(s => {
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = `
        <div class="stat-icon" style="color:${s.color}"><i class="${s.icon}"></i></div>
        <div class="stat-value" id="${s.id}">—</div>
        <div class="stat-label">${s.label}</div>
      `;
      statsGrid.appendChild(card);

    (async () => {
      const starsPromise = fetchGitHubStars();
      const reposPromise = fetchGitHubRepos();
      const rhPromise = withTimeout(fetchRoutineHub(), 7500, null);

      const [stars, ghRepos, rhData] = await Promise.all([starsPromise, reposPromise, rhPromise]);

      let downloads, rhShortcuts;

        downloads = 19100;

      const totalProjects = ghRepos + rhShortcuts;

      animateValue(document.getElementById('sv-0'), downloads, 1500);
      animateValue(document.getElementById('sv-1'), stars, 1500);
      animateValue(document.getElementById('sv-2'), totalProjects, 1500);
    })();

    const list = document.getElementById('projectsList');
    projects.forEach(p => {
      const card = document.createElement('div');
      card.className = 'project-card reveal';
      card.style.setProperty('--color', p.color);

      const n = p.buttons.length;
      const btnClass = n === 1 ? 'one-button' : n === 2 ? 'two-buttons' : n === 3 ? 'three-buttons' : '';

      let btnsHtml = '';
      p.buttons.forEach(b => {
        const ic = b.icon.includes('custom-icon')
          ? `<span class="${b.icon}"></span>`
          : `<i class="${b.icon}"></i>`;
        btnsHtml += `<a href="${b.href || '#'}" class="btn" style="background:${b.color};color:${b.textColor}">${ic}<span>${b.label}</span></a>`;
      });

      const iconHtml = p.image
        ? `<div class="project-icon has-image"><img src="${p.image}" alt="${p.title}"></div>`
        : `<div class="project-icon"><i class="${p.icon || ''}"></i></div>`;

      card.innerHTML = `
        <div class="project-header">
          ${iconHtml}
          <div class="project-title" style="background:linear-gradient(90deg, ${p.color} 0%, ${p.color} 25%, #ffffff 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${p.title}</div>
        </div>
        <div class="project-desc">${p.desc}</div>
        <div class="project-actions ${btnClass}">${btnsHtml}</div>
      `;

      list.appendChild(card);
    });

    const STAGGER = 120;
    let queue = [];
    let timerRunning = false;

    function processQueue() {
      if (!queue.length) { timerRunning = false; return; }
      queue.shift().classList.add('visible');
      setTimeout(processQueue, STAGGER);
    }

    function enqueue(el) {
      if (el.classList.contains('visible') || queue.includes(el)) return;
      queue.push(el);
      if (!timerRunning) { timerRunning = true; processQueue(); }
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { enqueue(e.target); observer.unobserve(e.target); }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -5% 0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
